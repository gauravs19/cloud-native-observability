name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  alert-rules:
    name: promtool — alert rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install promtool
        run: |
          VERSION=2.53.2
          curl -sSL "https://github.com/prometheus/prometheus/releases/download/v${VERSION}/prometheus-${VERSION}.linux-amd64.tar.gz" -o prom.tar.gz
          tar xzf prom.tar.gz
          sudo mv "prometheus-${VERSION}.linux-amd64/promtool" /usr/local/bin/
          promtool --version
      - name: Check rules syntax
        run: promtool check rules alerts/prometheus-rules.yml

  dashboards:
    name: JSON — Grafana dashboards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate dashboard JSON
        run: |
          fail=0
          for f in dashboards/*.json; do
            if python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "OK   $f"
            else
              echo "FAIL $f"; fail=1
            fi
          done
          exit $fail

  yaml-lint:
    name: yamllint — config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pipx install yamllint
      - name: Lint YAML
        run: yamllint -d "{extends: relaxed, rules: {line-length: disable}}" alerts/ .github/
